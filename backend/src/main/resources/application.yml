spring:
  application:
    name: ai-interview-platform

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate          # Schema managed exclusively by Flyway
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_batch_fetch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
    open-in-view: false           # Prevents lazy-loading across HTTP boundary

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # Redis
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # File uploads
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ─── Application Custom Properties ──────────────────────────────────────────
app:

  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForDevelopmentPurposesOnlyReplaceInProduction2024!}
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days

  email:
    from: ${EMAIL_FROM:noreply@aiinterview.com}
    from-name: AI Interview Platform
    verification-expiry-hours: 24
    password-reset-expiry-hours: 1
    verification-url: ${APP_URL:http://localhost:3000}/verify-email
    password-reset-url: ${APP_URL:http://localhost:3000}/reset-password

  storage:
    provider: ${STORAGE_PROVIDER:minio}         # minio | s3
    max-file-size-bytes: 10485760               # 10 MB
    allowed-content-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/msword
      - image/jpeg
      - image/png
      - image/webp
    s3:
      bucket: ${S3_BUCKET:ai-interview-files}
      region: ${AWS_REGION:us-east-1}
      presigned-url-expiry-minutes: 60
    minio:
      url: ${MINIO_URL:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:ai-interview-files}

  rate-limit:
    requests-per-minute: 60
    burst-capacity: 20

  gemini:
    project-id: ${GCP_PROJECT_ID:demo-project-id}
    location: ${GCP_LOCATION:us-central1}
    model: ${GEMINI_MODEL:gemini-1.5-pro}

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
      - http://localhost:5173

# ─── Actuator / Observability ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] %logger{36} - %msg%n'
  level:
    root: INFO
    com.aiinterview: DEBUG

# ─── SpringDoc / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
