version: '3.9'

services:

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiinterview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiinterview_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiinterview_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiinterview_net

  # ─── pgAdmin (optional DB GUI) ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aiinterview_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aiinterview.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aiinterview_net

  # ─── Redis 7 ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aiinterview_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiinterview_net

  # ─── MailHog (local SMTP + Web UI for email testing) ─────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: aiinterview_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    networks:
      - aiinterview_net

  # ─── MinIO (S3-compatible local object storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: aiinterview_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiinterview_net

  # ─── MinIO bucket initializer ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: aiinterview_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ai-interview-files &&
        mc anonymous set download local/ai-interview-files/public &&
        echo 'MinIO bucket initialized.'
      "
    networks:
      - aiinterview_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  aiinterview_net:
    driver: bridge
